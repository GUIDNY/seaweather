<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="#0a2540"/>

  <!-- Fox ears (pointed, above head) -->
  <polygon points="32,44 24,18 46,38" fill="#e8631a"/>
  <polygon points="88,44 96,18 74,38" fill="#e8631a"/>
  <!-- Inner ear -->
  <polygon points="35,42 29,24 44,38" fill="#f5c09a"/>
  <polygon points="85,42 91,24 76,38" fill="#f5c09a"/>

  <!-- Hoodie body (dark navy) -->
  <path d="M22 110 Q22 76 60 72 Q98 76 98 110 Z" fill="#0f3460"/>
  <!-- Hoodie center seam / pocket area -->
  <rect x="52" y="84" width="16" height="20" rx="3" fill="#0a2540" opacity="0.5"/>
  <!-- "W" letter on hoodie -->
  <text x="60" y="101" font-family="'Arial Black', Arial, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">W</text>

  <!-- Fox head -->
  <ellipse cx="60" cy="60" rx="28" ry="26" fill="#e8631a"/>

  <!-- White snout area -->
  <ellipse cx="60" cy="67" rx="17" ry="13" fill="#fff4e8"/>

  <!-- Eyes -->
  <circle cx="49" cy="56" r="5" fill="#1a1a2e"/>
  <circle cx="71" cy="56" r="5" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="51" cy="54" r="1.8" fill="white"/>
  <circle cx="73" cy="54" r="1.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="60" cy="65" rx="3.5" ry="2.5" fill="#1a1a2e"/>

  <!-- Surfboard (held at side, angled) -->
  <g transform="rotate(-25,104,88)">
    <rect x="96" y="62" width="10" height="38" rx="5" fill="#00b4d8"/>
    <rect x="97" y="70" width="8" height="5" rx="1" fill="white" opacity="0.5"/>
    <rect x="97" y="88" width="8" height="3" rx="1" fill="#ff6b35" opacity="0.8"/>
  </g>
</svg>
